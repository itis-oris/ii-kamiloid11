spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/skillswap}
    username: ${DB_USER:skillswap}
    password: ${DB_PASS:skillswap}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    locations: classpath:db/migration

currency:
  api:
    base-url: https://open.er-api.com/v6/latest
    timeout-seconds: 10

logging:
  level:
    com.skillswap: DEBUG
    org.springframework.security: INFO

server:
  error:
    whitelabel:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
